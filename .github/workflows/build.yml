name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: git-agent-linux-installer
            asset-path: dist/git-agent-linux-installer.tar.gz
          - name: macOS
            os: macos-latest
            artifact: git-agent-macos-installer
            asset-path: dist/git-agent-macos-installer.tar.gz
          - name: Windows
            os: windows-latest
            artifact: git-agent-windows-installer
            asset-path: dist/GitAgentSetup-*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            pkg-config

      - name: Normalize Git line endings
        if: runner.os != 'Windows'
        shell: bash
        run: git config --global core.autocrlf false && git config --global core.safecrlf false

      - name: Normalize Git line endings
        if: runner.os == 'Windows'
        shell: cmd
        run: git config --global core.autocrlf false && git config --global core.safecrlf false

      - name: Test
        if: runner.os != 'Windows'
        shell: bash
        run: cargo test --locked

      - name: Test
        if: runner.os == 'Windows'
        shell: cmd
        run: cargo test --locked

      - name: Build release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: cargo build --release --locked

      - name: Build release binaries
        if: runner.os == 'Windows'
        shell: cmd
        run: cargo build --release --locked

      - name: Package installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/${{ matrix.artifact }}"
          mkdir -p "$package_dir"
          cp target/release/git-agent "$package_dir/"
          cp target/release/git-agent-merge "$package_dir/"
          cp target/release/git-agent-diff "$package_dir/"
          cat > "$package_dir/install.sh" <<'INSTALLER'
          #!/usr/bin/env sh
          set -eu

          script_dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
          prefix=${PREFIX:-"$HOME/.local"}
          install_dir=${INSTALL_DIR:-"$prefix/bin"}

          mkdir -p "$install_dir"
          cp "$script_dir/git-agent" "$install_dir/git-agent"
          cp "$script_dir/git-agent-merge" "$install_dir/git-agent-merge"
          cp "$script_dir/git-agent-diff" "$install_dir/git-agent-diff"
          chmod 755 "$install_dir/git-agent" "$install_dir/git-agent-merge" "$install_dir/git-agent-diff"

          echo "Installed git-agent, git-agent-merge, and git-agent-diff to $install_dir"
          echo "Add $install_dir to PATH if it is not already there."
          INSTALLER
          sed -i.bak 's/^          //' "$package_dir/install.sh"
          rm "$package_dir/install.sh.bak"
          chmod +x "$package_dir/git-agent" "$package_dir/git-agent-merge" "$package_dir/git-agent-diff" "$package_dir/install.sh"
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}"

      - name: Package installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup --yes --no-progress

          $sourceDir = (Resolve-Path "target/release").Path
          $outputDir = (New-Item -ItemType Directory -Force -Path "dist").FullName
          $version = "${{ github.ref_name }}"
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6/ISCC.exe"

          & $iscc `
            "installer/windows/git-agent.iss" `
            "/DAppVersion=$version" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir"

      - name: Upload installer package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 3
          path: ${{ matrix.asset-path }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download installer packages
        uses: actions/download-artifact@v7
        with:
          pattern: git-agent-*-installer
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --verify-tag \
              --title "Git Agent $TAG_NAME" \
              --notes "Automated release for $TAG_NAME."
          fi

  cleanup:
    name: Keep recent build history
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete older build workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_FILE: build.yml
          KEEP_RUNS: "3"
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          run_ids=$(gh api "/repos/$REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs?per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id')

          index=0
          for run_id in $run_ids; do
            index=$((index + 1))
            if [ "$index" -le "$KEEP_RUNS" ]; then
              continue
            fi

            if [ "$run_id" = "$CURRENT_RUN_ID" ]; then
              continue
            fi

            gh api --method DELETE "/repos/$REPOSITORY/actions/runs/$run_id"
          done
